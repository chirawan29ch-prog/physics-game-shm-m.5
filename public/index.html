const ROWS=(()=>{
  const cells=Array.from({length:TOTAL},(_,i)=>i+1);
  const rows=[];
  for(let r=0;r<Math.ceil(TOTAL/COLS);r++){
    const row=cells.slice(r*COLS,r*COLS+COLS);
    rows.push(r%2===0?row:[...row].reverse());
  }
  return rows.reverse();
})();

// â”€â”€ SOCKET â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function initSocket(){
  socket=io();
  socket.on("room_created",({code})=>{room={code,status:"waiting",teams:{}};role="host";screen="host_lobby";render();});
  socket.on("joined",({code,teamId})=>{myId=teamId;role="team";screen="team_lobby";render();});
  socket.on("watching",({code,status})=>{role="host";screen=status==="playing"?"host_dashboard":"host_lobby";render();});
  socket.on("room_update",(r)=>{
    room=r;
    if(role==="team"&&r.status==="playing"&&screen==="team_lobby")screen="game";
    const me=room.teams[myId];
    if(me&&me.pendingQ&&!pendingQ){pendingQ=QUESTIONS.find(q=>q.step===me.pendingQ)||null;}
    if(me&&!me.pendingQ)pendingQ=null;
    const finCount=Object.values(r.teams).filter(t=>t.finished).length;
    if(finCount>=3&&!showWin)showWin=true;
    render();
  });
  socket.on("game_started",()=>{screen=role==="host"?"host_dashboard":"game";render();});
  socket.on("kicked",()=>{screen="landing";room=null;myId=null;showErr("à¸„à¸¸à¸“à¸–à¸¹à¸à¸„à¸£à¸¹à¸™à¸³à¸­à¸­à¸à¸ˆà¸²à¸à¸«à¹‰à¸­à¸‡");render();});
  socket.on("err",(msg)=>showErr(msg));
}

function processMove(team,roll){
  let newPos=Math.min(team.pos+roll,TOTAL);
  let t={...team,log:[`ðŸŽ² à¸—à¸­à¸¢à¹„à¸”à¹‰ ${roll} â†’ à¹„à¸›à¸Šà¹ˆà¸­à¸‡à¸—à¸µà¹ˆ ${newPos}`,...(team.log||[])]};
  const q=QUESTIONS.find(q=>q.step===newPos);
  if(q)return{...t,pos:newPos,pendingQ:newPos,log:[`â“ à¹€à¸ˆà¸­à¸„à¸³à¸–à¸²à¸¡à¸Šà¹ˆà¸­à¸‡à¸—à¸µà¹ˆ ${newPos}!`,...t.log]};
  t={...t,pos:newPos};
  if(TRAPS.has(newPos)){const b=Math.max(1,newPos-2);t={...t,pos:b,log:[`ðŸ’€ à¸à¸±à¸šà¸”à¸±à¸! à¸–à¸­à¸¢à¸«à¸¥à¸±à¸‡ 2 à¸Šà¹ˆà¸­à¸‡ â†’ à¸Šà¹ˆà¸­à¸‡à¸—à¸µà¹ˆ ${b}`,...t.log]};}
  if(BOOSTS.has(newPos)){const f=Math.min(TOTAL,newPos+2);t={...t,pos:f,log:[`â­ à¸šà¸¹à¸ªà¸•à¹Œ! à¹€à¸”à¸´à¸™à¸«à¸™à¹‰à¸² 2 à¸Šà¹ˆà¸­à¸‡ â†’ à¸Šà¹ˆà¸­à¸‡à¸—à¸µà¹ˆ ${f}`,...t.log]};}
  if(t.pos>=TOTAL)t={...t,pos:TOTAL,finished:true,finishedAt:Date.now(),log:["ðŸ† à¸–à¸¶à¸‡à¹€à¸›à¹‰à¸²à¸«à¸¡à¸²à¸¢à¹à¸¥à¹‰à¸§!",...t.log]};

}

function showErr(msg){
  const el=document.getElementById("errbar");
  if(!el)return;
  el.textContent="âš ï¸ "+msg;el.style.display="block";

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  if(children)children.forEach(c=>{if(c==null)return;el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}

// â”€â”€ BOARD CELL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function makeCell(n,teams,sm){
  const isQ=Q_STEPS.has(n),isTrap=TRAPS.has(n),isBoost=BOOSTS.has(n),isGoal=n===TOTAL;
  const here=teams.filter(t=>t.pos===n);
  const sz=sm?"40px":"52px";
  let bg=C.card,bdr=`1px solid ${C.border}`;
  if(isGoal){bg="#052E16";bdr=`2px solid ${C.green}`;}
  else if(isQ){bg="#1A1756";bdr="1.5px solid #6366F1";}
  else if(isTrap){bg="#250808";bdr=`1.5px solid ${C.red}66`;}
  else if(isBoost){bg="#072214";bdr=`1.5px solid ${C.green}66`;}
  const numEl=h("span",{style:{position:"absolute",top:"2px",left:"3px",fontSize:"8px",color:C.border}},[String(n)]);
  let icon="";
  if(isGoal)icon="ðŸ†";else if(isQ)icon="â“";else if(isTrap)icon="ðŸ’€";else if(isBoost)icon="â­";
  const iconEl=icon?h("span",{style:{fontSize:sm?"16px":"19px"}},[icon]):null;
  const cell=h("div",{style:{position:"relative",width:sz,height:sz,background:bg,border:bdr,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},[numEl,iconEl]);
  if(here.length>0){
    const wrap=h("div",{style:{position:"absolute",top:"-7px",right:"-7px",display:"flex",flexWrap:"wrap",gap:"1px",maxWidth:"40px",justifyContent:"flex-end",zIndex:"2"}},[]);
    here.slice(0,4).forEach(t=>{wrap.appendChild(h("div",{style:{width:"20px",height:"20px",borderRadius:"50%",background:t.color,border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",boxShadow:`0 0 8px ${t.color}`,animation:"bob .7s ease infinite alternate"}},[t.emoji]));});
    cell.appendChild(wrap);
  }
  return cell;
}
function makeBoard(teams,sm){
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",gap:sm?"3px":"4px"}},[]);
  ROWS.forEach(row=>{const rowEl=h("div",{style:{display:"flex",gap:sm?"3px":"4px"}},[]);row.forEach(n=>rowEl.appendChild(makeCell(n,teams,sm)));wrap.appendChild(rowEl);});

}

function render(){
  const app=document.getElementById("app");
  const errbar=document.getElementById("errbar");
  app.innerHTML="";
  if(errbar)app.appendChild(errbar);
  let view;
  if(screen==="landing")           view=renderLanding();
  else if(screen==="host_lobby")   view=renderHostLobby();
  else if(screen==="team_lobby")   view=renderTeamLobby();
  else if(screen==="game")         view=renderGame();
  else if(screen==="host_dashboard")view=renderHostDashboard();
  if(view)app.appendChild(view);
}

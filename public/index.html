<!DOCTYPE html>
<html lang="th">
<head>

<title>🗺️ ล่าขุมทรัพย์ฟิสิกส์</title>
<script src="/socket.io/socket.io.js"></script>
<style>

<body>
<div id="app"></div>
<script>

function showErr(msg){const el=document.getElementById("errbar");if(!el)return;el.textContent="⚠️ "+msg;el.style.display="block";setTimeout(()=>el.style.display="none",3000);}

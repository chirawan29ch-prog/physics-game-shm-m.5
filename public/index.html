  {step:15,q:"สปริง k = 500 N/m มวล 2 kg แอมพลิจูด 8 cm อัตราเร็วสูงสุด v_max = ?",ch:["0.63 m/s","1.26 m/s","2.00 m/s","4.00 m/s"],ans:1,hint:"v_max = A√(k/m) = 0.08×√250 ≈ 1.26 m/s"},

function makeCell(n,teams,sm){const isQ=Q_STEPS.has(n),isTrap=TRAPS.has(n),isBoost=BOOSTS.has(n),isGoal=n===TOTAL;const here=teams.filter(t=>t.pos===n);const sz=sm?"40px":"52px";let bg=C.card,bdr="1px solid "+C.border;if(isGoal){bg="#052E16";bdr="2px solid "+C.green;}else if(isQ){bg="#1A1756";bdr="1.5px solid #6366F1";}else if(isTrap){bg="#250808";bdr="1.5px solid "+C.red+"66";}else if(isBoost){bg="#072214";bdr="1.5px solid "+C.green+"66";}const numEl=h("span",{style:{position:"absolute",top:"2px",left:"3px",fontSize:"8px",color:C.border}},[String(n)]);let icon="";if(isGoal)icon="🏆";else if(isQ)icon="❓";else if(isTrap)icon="💀";else if(isBoost)icon="⭐";const iconEl=icon?h("span",{style:{fontSize:sm?"16px":"19px"}},[icon]):null;const cell=h("div",{style:{position:"relative",width:sz,height:sz,background:bg,border:bdr,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},[numEl,iconEl]);if(here.length>0){const wrap=h("div",{style:{position:"absolute",top:"-7px",right:"-7px",display:"flex",flexWrap:"wrap",gap:"1px",maxWidth:"40px",justifyContent:"flex-end",zIndex:"2"}},[]);here.slice(0,4).forEach(t=>{wrap.appendChild(h("div",{style:{width:"20px",height:"20px",borderRadius:"50%",background:t.color,border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",boxShadow:"0 0 8px "+t.color,animation:"bob .7s ease infinite alternate"}},[t.emoji]));});cell.appendChild(wrap);}return cell;}

display:"flex",flexDirection:"column",gap:"10px"}},[]);const stats=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"12px 14px",display:"flex",gap:"16px",flexWrap:"wrap"}},[]);[["ทีมทั้งหมด",teams.length,"#A78BFA"],["จบแล้ว",teams.filter(t=>t.finished).length,C.green],["กำลังตอบ",teams.filter(t=>t.pendingQ).length,C.yellow],["โจทย్","11/30",C.cyan]].forEach(([lb2,v,col])=>{const d=h("div",{style:{textAlign:"center"}},[]);const dv=h("div",{style:{fontSize:"22px",fontWeight:"900",color:col}},{},);dv.textContent=String(v);const dl=h("div",{style:{fontSize:"10px",color:C.sub}},{},);dl.textContent=lb2;d.appendChild(dv);d.appendChild(dl);stats.appendChild(d);});right.appendChild(stats);const teamBox=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"12px 13px"}},[]);const tbh=h("div",{style:{fontSize:"11px",color:C.sub,fontWeight:"700",marginBottom:"10px"}},{},);tbh.textContent="🏅 อันดับทีม";teamBox.appendChild(tbh);sorted.forEach((t,i)=>{const card=h("div",{style:{background:C.card,borderRadius:"9px",padding:"9px 11px",marginBottom:"7px",border:"1.5px solid "+t.color+"33",display:"flex",alignItems:"center",gap:"8px"}},[h("span",{style:{fontSize:"13px",width:"19px",textAlign:"center"}},{},),h("span",{style:{fontSize:"18px"}},[t.emoji]),h("div",{style:{flex:"1",minWidth:"0"}},[])]);card.children[0].textContent=["🥇","🥈","🥉"][i]||(i+1)+".";const dn=h("div",{style:{fontWeight:"700",color:t.color,fontSize:"12px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},{},);dn.textContent=t.name+(t.finished?" 🏆":"");const dbar=h("div",{style:{height:"4px",background:C.border,borderRadius:"3px",marginTop:"2px"}},[h("div",{style:{height:"100%",background:t.color,borderRadius:"3px",width:((t.pos-1)/(TOTAL-1)*100)+"%",transition:"width .4s"}})]);const dp=h("div",{style:{fontSize:"10px",color:C.sub,marginTop:"2px"}},{},);dp.textContent="ช่อง "+t.pos+"/"+TOTAL;card.children[2].appendChild(dn);card.children[2].appendChild(dbar);card.children[2].appendChild(dp);if(t.pendingQ){const pq=h("span",{style:{color:C.yellow,marginLeft:"4px",fontSize:"10px"}},{},);pq.textContent=" ⏳ ตอบอยู่";dp.appendChild(pq);}const kb=h("button",{style:{background:"none",border:"1px solid "+C.red+"55",borderRadius:"6px",padding:"3px 8px",color:C.red,fontSize:"10px"},onClick:()=>socket.emit("kick_team",{code:room.code,teamId:t.id})},{},);kb.textContent="นำออก";card.appendChild(kb);teamBox.appendChild(card);});if(!teams.length){const nt=h("div",{style:{color:C.border,fontSize:"13px",textAlign:"center",padding:"10px 0"}},{},);nt.textContent="ยังไม่มีทีม";teamBox.appendChild(nt);}right.appendChild(teamBox);const logBox=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"10px 12px"}},[]);const lgh=h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700",marginBottom:"8px"}},{},);lgh.textContent="📋 บันทึกล่าสุด";logBox.appendChild(lgh);teams.flatMap(t=>(t.log||[]).slice(0,2).map((l,i)=>({emoji:t.emoji,color:t.color,name:t.name,msg:l,key:t.id+i}))).slice(0,8).forEach(item=>{const row=h("div",{style:{display:"flex",gap:"5px",marginBottom:"4px",fontSize:"10px"}},[h("span",{},[item.emoji])]);const nm=h("span",{style:{color:item.color,fontWeight:"700",flexShrink:"0"}},{},);nm.textContent=item.name+":";const mg=h("span",{style:{color:C.sub}},{},);mg.textContent=item.msg;row.appendChild(nm);row.appendChild(mg);logBox.appendChild(row);});if(!teams.length){const nt=h("div",{style:{color:C.border,fontSize:"11px"}},{},);nt.textContent="ยังไม่มีกิจกรรม";logBox.appendChild(nt);}right.appendChild(logBox);main.appendChild(right);wrap.appendChild(main);if(showWin)wrap.appendChild(makeWinScreen(teams));return wrap;}
function render(){const app=document.getElementById("app");const errbar=document.getElementById("errbar");app.innerHTML="";if(errbar)app.appendChild(errbar);let view;if(screen==="landing")view=renderLanding();else if(screen==="host_lobby")view=renderHostLobby();else if(screen==="team_lobby")view=renderTeamLobby();else if(screen==="game")view=renderGame();else if(screen==="host_dashboard")view=renderHostDashboard();if(view)app.appendChild(view);}
window.addEventListener("DOMContentLoaded",()=>{const errbar=h("div",{id:"errbar",style:{display:"none",position:"fixed",top:"14px",left:"50%",transform:"translateX(-50%)",background:"#250808",border:"1.5px solid "+C.red,borderRadius:"10px",padding:"9px 18px",color:"#FCA5A5",fontSize:"13px",cursor:"pointer",zIndex:"9999",boxShadow:"0 4px 20px "+C.red+"44",whiteSpace:"nowrap"}},[]);errbar.addEventListener("click",()=>errbar.style.display="none");document.getElementById("app").appendChild(errbar);initSocket();render();});

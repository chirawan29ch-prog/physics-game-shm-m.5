<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHM Map</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Sarabun,sans-serif;background:#080616;color:#EDE9FF;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.cell{position:relative;width:52px;height:52px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cell-num{position:absolute;top:2px;left:3px;font-size:8px;color:#231748;}
.cell-icon{font-size:19px;}
.tokens{position:absolute;top:-7px;right:-7px;display:flex;flex-wrap:wrap;gap:1px;max-width:40px;justify-content:flex-end;z-index:2;}
.token{width:20px;height:20px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;animation:bob .7s ease infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-5px)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@media(min-width:600px){
  .cell{width:62px;height:62px;}
  .cell-icon{font-size:24px;}
  .token{width:22px;height:22px;font-size:12px;}
}
@media(min-width:900px){
  .cell{width:72px;height:72px;}
  .cell-icon{font-size:28px;}
  .token{width:24px;height:24px;font-size:13px;}
  #game-layout{flex-wrap:nowrap!important;}
  #right-panel{flex:1!important;max-width:380px!important;min-width:240px!important;}
  #dice-face{font-size:96px!important;}
  #roll-btn{font-size:17px!important;padding:15px 0!important;}
}
@media(min-width:1200px){
  .cell{width:84px;height:84px;}
  .cell-icon{font-size:34px;}
  .token{width:28px;height:28px;font-size:15px;}
  #right-panel{max-width:440px!important;}
  #dice-face{font-size:112px!important;}
}
@media(min-width:1500px){
  .cell{width:96px;height:96px;}
  .cell-icon{font-size:40px;}
  #right-panel{max-width:520px!important;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TOTAL=30,COLS=6;
const Q_STEPS=new Set([3,6,9,12,15,17,20,22,24,26,28]);
const TRAPS=new Set([5,11,16,23,27]);
const BOOSTS=new Set([7,13,19,25]);
const QUESTIONS=[
  {step:3,q:"การเคลื่อนที่แบบ SHM เกิดขึ้นเมื่อแรงลัพธ์ที่กระทำต่อวัตถุเป็นอย่างไร?",ch:["คงที่ตลอดเวลา","แปรผันตรงกับการกระจัด พุ่งเข้าหาสมดุล","แปรผันตรงกับความเร็ว","เป็นศูนย์ตลอดเวลา"],ans:1,hint:"F = −kx แรงพุ่งเข้าหาตำแหน่งสมดุลเสมอ"},
  {step:6,q:"ลูกตุ้มเชือกยาว 40 cm แกว่งบนดาวที่ g = 4.9 m/s² คาบ T = ?",ch:["0.90 s","1.26 s","1.79 s","2.00 s"],ans:2,hint:"T = 2π√(L/g) = 2π√(0.4/4.9) ≈ 1.79 s"},
  {step:9,q:"สปริง k = 400 N/m ติดมวล 1 kg ความถี่ f = ?",ch:["2.0 Hz","3.2 Hz","6.3 Hz","20.0 Hz"],ans:1,hint:"f = (1/2π)√(k/m) = (1/2π)√400 ≈ 3.18 Hz"},
  {step:12,q:"ถ้าวัตถุเริ่มต้นที่ตำแหน่งสมดุล กราฟ x(t) มีรูปแบบใด?",ch:["A cos(ωt)","A sin(ωt)","A tan(ωt)","เส้นตรง"],ans:1,hint:"เริ่มที่ x = 0 → x = A sin(ωt)"},
  {step:15,q:"สปริง k = 500 N/m มวล 2 kg แอมพลิจูด 8 cm อัตราเร็วสูงสุด v_max = ?",ch:["0.63 m/s","1.26 m/s","2.00 m/s","4.00 m/s"],ans:1,hint:"v_max = A√(k/m) = 0.08×√250 ≈ 1.26 m/s"},
  {step:17,q:"ตำแหน่งใดใน SHM ที่พลังงานจลน์ = พลังงานศักย์?",ch:["x = 0","x = ±A","x = ±A/√2","x = ±A/2"],ans:2,hint:"½mv² = ½kx² → x = A/√2 ≈ 0.707A"},
  {step:20,q:"มวล 0.4 kg สปริง k = 160 N/m แอมพลิจูด 6 cm ความเร่งสูงสุด a_max = ?",ch:["12 m/s²","24 m/s²","48 m/s²","96 m/s²"],ans:1,hint:"a_max = (k/m)·A = (160/0.4)×0.06 = 24 m/s²"},
  {step:22,q:"ถ้าเพิ่มมวลที่ติดสปริงเป็น 4 เท่า คาบจะเปลี่ยนแปลงอย่างไร?",ch:["เพิ่มเป็น 2 เท่า","เพิ่มเป็น 4 เท่า","ลดเหลือครึ่งหนึ่ง","ไม่เปลี่ยนแปลง"],ans:0,hint:"T = 2π√(m/k) → m×4 → T×√4 = 2T"},
  {step:24,q:"สปริง k = 300 N/m แอมพลิจูด 10 cm พลังงานกลรวม E = ?",ch:["0.75 J","1.50 J","3.00 J","6.00 J"],ans:1,hint:"E = ½kA² = ½×300×(0.1)² = 1.50 J"},
  {step:26,q:"ตัดเชือกลูกตุ้มให้สั้นลงเหลือ 1/4 คาบจะเปลี่ยนอย่างไร?",ch:["ลดเหลือ 1/4","ลดเหลือ 1/2","เพิ่มเป็น 2 เท่า","ไม่เปลี่ยนแปลง"],ans:1,hint:"T = 2π√(L/g) → L×(1/4) → T×(1/2)"},
  {step:28,q:"SHM แอมพลิจูด 10 cm ω = 5 rad/s ที่ตำแหน่ง x = 6 cm อัตราเร็ว v = ?",ch:["0.32 m/s","0.40 m/s","0.50 m/s","0.60 m/s"],ans:1,hint:"v = ω√(A²−x²) = 5×√(0.01−0.0036) = 5×0.08 = 0.40 m/s"},
];
const PALETTE=[
  {color:"#EC4899",emoji:"🌸"},{color:"#06B6D4",emoji:"🌊"},
  {color:"#10B981",emoji:"🍀"},{color:"#F59E0B",emoji:"⚡"},
  {color:"#A78BFA",emoji:"🔮"},{color:"#EF4444",emoji:"🔥"},
];
const FACES=["","⚀","⚁","⚂","⚃","⚄","⚅"];
const C={bg:"#080616",panel:"#0F0B26",card:"#160E32",border:"#231748",
  text:"#EDE9FF",sub:"#6B5EAD",yellow:"#FCD34D",green:"#10B981",
  red:"#EF4444",cyan:"#06B6D4",purple:"#7C3AED",pink:"#EC4899"};

const ROWS=(()=>{
  const cells=Array.from({length:TOTAL},(_,i)=>i+1);
  const rows=[];
  for(let r=0;r<Math.ceil(TOTAL/COLS);r++){
    const row=cells.slice(r*COLS,r*COLS+COLS);
    rows.push(r%2===0?row:[...row].reverse());
  }
  return rows.reverse();
})();

// ── STATE ──────────────────────────────────────────────────────────────────────
let socket;
let screen="landing",room=null,myId=null,role=null;
let diceVal=null,rolling=false,pendingQ=null,showWin=false;
let activeTab="join",joinCode="",joinName="",watchCode="";
let diceAnimInterval=null;

// ── SOCKET ─────────────────────────────────────────────────────────────────────
function initSocket(){
  socket=io();

  socket.on("room_created",({code})=>{
    room={code,status:"waiting",teams:{}};
    role="host"; screen="host_lobby"; render();
  });

  socket.on("joined",({code,teamId})=>{
    myId=teamId; role="team"; screen="team_lobby"; render();
  });

  socket.on("watching",({code,status})=>{
    role="host";
    screen=status==="playing"?"host_dashboard":"host_lobby";
    render();
  });

  socket.on("room_update",(r)=>{
    room=r;
    if(role==="team"&&r.status==="playing"&&screen==="team_lobby") screen="game";
    // ตรวจคำถามค้าง
    const me=room.teams[myId];
    if(me&&me.pendingQ&&!pendingQ){
      pendingQ=QUESTIONS.find(q=>q.step===me.pendingQ)||null;
    }
    if(me&&!me.pendingQ) pendingQ=null;
    // ตรวจชนะ
    const finCount=Object.values(r.teams).filter(t=>t.finished).length;
    if(finCount>=3&&!showWin) showWin=true;
    render();
  });

  socket.on("game_started",()=>{
    screen=role==="host"?"host_dashboard":"game";
    render();
  });

  // ── รับผลลูกเต๋าจาก server ──
  // โฟล: กดปุ่ม → server ทอย → ส่ง dice_result → client เล่น animation → หยุดที่เลขจริง
  socket.on("dice_result",({roll})=>{
    clearInterval(diceAnimInterval);
    let c=0;
    diceAnimInterval=setInterval(()=>{
      const v=Math.floor(Math.random()*6)+1;
      diceVal=v;
      const df=document.getElementById("diceFace");
      if(df) df.textContent=FACES[v];
      c++;
      if(c>=14){
        clearInterval(diceAnimInterval);
        // หยุดที่เลขจริงจาก server
        diceVal=roll;
        rolling=false;
        const df2=document.getElementById("diceFace");
        if(df2) df2.textContent=FACES[roll];
        // render เพื่ออัปเดต label "ทอยได้: X"
        render();
      }
    },60);
  });

  socket.on("kicked",()=>{
    screen="landing"; room=null; myId=null;
    showErr("คุณถูกครูนำออกจากห้อง"); render();
  });

  socket.on("err",(msg)=>showErr(msg));
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function showErr(msg){
  const el=document.getElementById("errbar");
  if(!el) return;
  el.textContent="⚠️ "+msg;
  el.style.display="block";
  setTimeout(()=>el.style.display="none",3000);
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") el.className=v;
    else el.setAttribute(k,v);
  });
  if(children) children.forEach(c=>{
    if(c==null) return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
}

// ── BOARD ──────────────────────────────────────────────────────────────────────
function makeCell(n,teams){
  const isQ=Q_STEPS.has(n),isTrap=TRAPS.has(n),isBoost=BOOSTS.has(n),isGoal=n===TOTAL;
  const here=teams.filter(t=>t.pos===n);
  let bg=C.card,bdr="1px solid "+C.border;
  if(isGoal){bg="#052E16";bdr="2px solid "+C.green;}
  else if(isQ){bg="#1A1756";bdr="1.5px solid #6366F1";}
  else if(isTrap){bg="#250808";bdr="1.5px solid "+C.red+"66";}
  else if(isBoost){bg="#072214";bdr="1.5px solid "+C.green+"66";}
  let icon="";
  if(isGoal)icon="🏆";
  else if(isQ)icon="❓";
  else if(isTrap)icon="💀";
  else if(isBoost)icon="⭐";
  const cell=h("div",{class:"cell",style:{background:bg,border:bdr}},[
    h("span",{class:"cell-num"},[String(n)]),
    icon?h("span",{class:"cell-icon"},[icon]):null,
  ]);
  if(here.length>0){
    const wrap=h("div",{class:"tokens"},[]);
    here.slice(0,4).forEach(t=>{
      wrap.appendChild(h("div",{class:"token",style:{background:t.color,boxShadow:"0 0 8px "+t.color}},[t.emoji]));
    });
    cell.appendChild(wrap);
  }
  return cell;
}

function makeBoard(teams){
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",gap:"3px"}},[]);
  ROWS.forEach(row=>{
    const rowEl=h("div",{style:{display:"flex",gap:"3px"}},[]);
    row.forEach(n=>rowEl.appendChild(makeCell(n,teams)));
    wrap.appendChild(rowEl);
  });
  return wrap;
}

// ── QUESTION MODAL ─────────────────────────────────────────────────────────────
function makeQModal(q,myColor){
  let answered=false;
  const overlay=h("div",{style:{position:"fixed",inset:"0",background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"500",padding:"16px"}},[]);
  const box=h("div",{style:{background:"linear-gradient(145deg,"+C.panel+","+C.card+")",border:"2.5px solid "+myColor,borderRadius:"20px",padding:"24px 22px",maxWidth:"520px",width:"100%",boxShadow:"0 0 50px "+myColor+"44"}},[]);

  // header tags
  const tags=h("div",{style:{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap"}},[]);
  const t1=h("span",{style:{background:myColor+"22",border:"1px solid "+myColor+"55",borderRadius:"20px",padding:"3px 12px",fontSize:"13px",color:myColor,fontWeight:"700"}},[]);
  t1.textContent="❓ ช่องที่ "+q.step;
  const t2=h("span",{style:{background:C.cyan+"22",border:"1px solid "+C.cyan+"55",borderRadius:"20px",padding:"3px 12px",fontSize:"13px",color:C.cyan,fontWeight:"700"}},["คำถาม SHM"]);
  tags.appendChild(t1); tags.appendChild(t2);
  box.appendChild(tags);

  // question text
  const qp=h("p",{style:{color:C.text,fontSize:"16px",lineHeight:"1.7",margin:"0 0 18px"}},[q.q]);
  box.appendChild(qp);

  // choices
  const cw=h("div",{style:{display:"flex",flexDirection:"column",gap:"9px"}},[]);
  q.ch.forEach((c,i)=>{
    const btn=h("button",{
      style:{background:C.card,border:"1.5px solid "+C.border,borderRadius:"10px",padding:"12px 14px",
        color:C.text,fontSize:"15px",fontFamily:"Cambria,serif",fontStyle:"italic",
        cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:"10px",
        width:"100%",transition:"all .15s"},
      onClick:()=>{
        if(answered) return;
        answered=true;
        // highlight
        Array.from(cw.children).forEach((b,j)=>{
          if(j===q.ans) Object.assign(b.style,{background:"#052E16",border:"2px solid "+C.green,color:"#6EE7B7"});
          else if(j===i&&i!==q.ans) Object.assign(b.style,{background:"#250808",border:"2px solid "+C.red,color:"#FCA5A5"});
        });
        // hint
        const hintEl=h("div",{style:{marginTop:"14px",background:"#061A10",border:"1px solid "+C.green+"44",borderRadius:"9px",padding:"9px 13px",fontSize:"13px",color:"#6EE7B7"}},[]);
        hintEl.textContent="💡 "+q.hint;
        box.appendChild(hintEl);
        // ส่งคำตอบไป server แล้วปิด modal
        setTimeout(()=>{
          socket.emit("answer_question",{code:room.code,answerIdx:i});
          overlay.remove();
          pendingQ=null;
        },1200);
      }
    },[
      h("span",{style:{width:"28px",height:"28px",borderRadius:"50%",background:C.border,
        flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:"13px",fontWeight:"700",color:C.sub,fontStyle:"normal"}},[String(i+1)]),
      c
    ]);
    cw.appendChild(btn);
  });
  box.appendChild(cw);
  overlay.appendChild(box);
  return overlay;
}

// ── WIN SCREEN ─────────────────────────────────────────────────────────────────
function makeWinScreen(teams){
  const fin=[...teams].filter(t=>t.finished).sort((a,b)=>a.finishedAt-b.finishedAt).slice(0,3);
  const still=[...teams].filter(t=>!t.finished).sort((a,b)=>b.pos-a.pos);
  const medals=["🥇","🥈","🥉"];
  const podH=[100,75,55],podC=["#FFD700","#C0C0C0","#CD7F32"];

  const overlay=h("div",{style:{position:"fixed",inset:"0",background:"#000e",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"600",padding:"16px"}},[]);
  const box=h("div",{style:{background:"linear-gradient(145deg,#0A0520,#150D35)",border:"2px solid #7C3AED",borderRadius:"24px",padding:"28px 24px",maxWidth:"440px",width:"100%",textAlign:"center"}},[]);

  const trophy=h("div",{style:{fontSize:"52px",marginBottom:"4px"}},[]);trophy.textContent="🏆";box.appendChild(trophy);
  const title=h("h2",{style:{fontSize:"24px",color:C.yellow,margin:"0 0 4px",fontWeight:"900"}},[]);title.textContent="จบเกม!";box.appendChild(title);
  const sub=h("p",{style:{color:C.sub,fontSize:"14px",margin:"0 0 24px"}},[]);sub.textContent="3 ทีมแรกที่ถึงช่องที่ 30";box.appendChild(sub);

  // podium
  const podWrap=h("div",{style:{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:"8px",marginBottom:"24px",height:"160px"}},[]);
  [fin[1],fin[0],fin[2]].forEach((t,idx)=>{
    const rank=[1,0,2][idx];
    if(!t){podWrap.appendChild(h("div",{style:{width:"110px"}}));return;}
    const col=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",width:"110px"}},[]);
    const em=h("div",{style:{fontSize:"28px",marginBottom:"2px"}},[]);em.textContent=t.emoji;col.appendChild(em);
    const nm=h("div",{style:{fontSize:"12px",fontWeight:"700",color:t.color,maxWidth:"100px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:"4px"}},[]);nm.textContent=t.name;col.appendChild(nm);
    const pd=h("div",{style:{width:"100%",height:podH[rank]+"px",background:"linear-gradient(180deg,"+podC[rank]+"44,"+podC[rank]+"22)",border:"2px solid "+podC[rank]+"88",borderRadius:"8px 8px 0 0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px"}},[]);pd.textContent=medals[rank];col.appendChild(pd);
    podWrap.appendChild(col);
  });
  box.appendChild(podWrap);

  // remaining teams
  if(still.length>0){
    const sl=h("div",{style:{background:C.card,borderRadius:"10px",padding:"10px 14px",marginBottom:"18px",textAlign:"left"}},[]);
    const slh=h("div",{style:{fontSize:"12px",color:C.sub,fontWeight:"700",marginBottom:"8px"}},[]);slh.textContent="ทีมที่เหลือ";sl.appendChild(slh);
    still.forEach((t,i)=>{
      const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"5px 0",borderBottom:i<still.length-1?"1px solid "+C.border+"44":"none"}},[]);
      const rk=h("span",{style:{color:C.sub}},[]);rk.textContent="#"+(fin.length+i+1);
      const em=h("span",{},[t.emoji]);
      const nm=h("span",{style:{color:t.color,fontWeight:"700",fontSize:"13px"}},[]);nm.textContent=t.name;
      const ps=h("span",{style:{marginLeft:"auto",fontSize:"11px",color:C.sub}},[]);ps.textContent="ช่อง "+t.pos;
      row.appendChild(rk);row.appendChild(em);row.appendChild(nm);row.appendChild(ps);sl.appendChild(row);
    });
    box.appendChild(sl);
  }

  const cb=h("button",{style:{background:"linear-gradient(135deg,"+C.purple+","+C.pink+")",border:"none",borderRadius:"12px",padding:"12px 40px",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"},onClick:()=>{showWin=false;overlay.remove();render();}},["เล่นอีกครั้ง 🔄"]);
  box.appendChild(cb);
  overlay.appendChild(box);
  return overlay;
}

// ── SCREENS ────────────────────────────────────────────────────────────────────
function renderLanding(){
  const wrap=h("div",{style:{minHeight:"100vh",background:"radial-gradient(ellipse at 35% 25%,#2A1760,"+C.bg+" 65%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 18px"}},[]);

  // title
  const hd=h("div",{style:{textAlign:"center",marginBottom:"24px"}},[]);
  const badge=h("div",{style:{display:"inline-block",background:"linear-gradient(90deg,#7C3AED,#EC4899)",borderRadius:"20px",padding:"5px 20px",fontSize:"13px",fontWeight:"700",color:"#fff",marginBottom:"14px"}},[]);
  badge.textContent="🐍 SHM Snake & Ladder — Physics A-Level";hd.appendChild(badge);
  const title=h("h1",{style:{fontSize:"34px",fontWeight:"900",margin:"0 0 4px",background:"linear-gradient(90deg,#A78BFA,#F9A8D4,#FCD34D)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},[]);
  title.textContent="ผจญภัยใน SHM Map";hd.appendChild(title);
  wrap.appendChild(hd);

  // legend
  const leg=h("div",{style:{display:"flex",gap:"12px",marginBottom:"24px",flexWrap:"wrap",justifyContent:"center"}},[]);
  [["❓","โจทย์\n(ถูก=ทอยต่อ ผิด=ถอย3)"],["💀","กับดัก\n(ถอยหลัง 2 ช่อง)"],["⭐","บูสต์\n(เดินหน้า 2 ช่อง)"],["🏆","เป้าหมาย\n(ช่องที่ 30)"]].forEach(([ic,lb])=>{
    const d=h("div",{style:{textAlign:"center",background:C.panel,border:"1px solid "+C.border,borderRadius:"12px",padding:"10px 12px",minWidth:"76px"}},[]);
    const ie=h("div",{style:{fontSize:"24px",marginBottom:"4px"}},[]);ie.textContent=ic;d.appendChild(ie);
    const le=h("div",{style:{fontSize:"11px",color:C.sub,whiteSpace:"pre-line",lineHeight:"1.4"}},[]);le.textContent=lb;d.appendChild(le);
    leg.appendChild(d);
  });

    const dv=h("div",{style:{fontSize:"22px",fontWeight:"900",color:col}},[]);dv.textContent=String(v);
    const dl3=h("div",{style:{fontSize:"10px",color:C.sub}},[]);dl3.textContent=lb3;
    d.appendChild(dv);d.appendChild(dl3);stats.appendChild(d);
  });
  right2.appendChild(stats);

  const tb2=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"12px 13px"}},[]);
  const tb2h=h("div",{style:{fontSize:"11px",color:C.sub,fontWeight:"700",marginBottom:"10px"}},[]);tb2h.textContent="🏅 อันดับทีม";tb2.appendChild(tb2h);
  sorted.forEach((t,i)=>{
    const card=h("div",{style:{background:C.card,borderRadius:"9px",padding:"9px 11px",marginBottom:"7px",border:"1.5px solid "+t.color+"33",display:"flex",alignItems:"center",gap:"8px"}},[]);
    const rk=h("span",{style:{fontSize:"13px",width:"19px",textAlign:"center"}},[]);rk.textContent=["🥇","🥈","🥉"][i]||(i+1)+".";
    const em=h("span",{style:{fontSize:"18px"}},[t.emoji]);
    const di=h("div",{style:{flex:"1",minWidth:"0"}},[]);
    const dn=h("div",{style:{fontWeight:"700",color:t.color,fontSize:"12px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},[]);dn.textContent=t.name+(t.finished?" 🏆":"");
    const dbar=h("div",{style:{height:"4px",background:C.border,borderRadius:"3px",marginTop:"2px"}},[h("div",{style:{height:"100%",background:t.color,borderRadius:"3px",width:((t.pos-1)/(TOTAL-1)*100)+"%",transition:"width .4s"}},[])]);
    const dp=h("div",{style:{fontSize:"10px",color:C.sub,marginTop:"2px"}},[]);dp.textContent="ช่อง "+t.pos+"/"+TOTAL+(t.pendingQ?" ⏳":"");
    di.appendChild(dn);di.appendChild(dbar);di.appendChild(dp);
    const kb=h("button",{style:{background:"none",border:"1px solid "+C.red+"55",borderRadius:"6px",padding:"3px 8px",color:C.red,fontSize:"10px"},onClick:()=>socket.emit("kick_team",{code:room.code,teamId:t.id})},[]);kb.textContent="นำออก";
    card.appendChild(rk);card.appendChild(em);card.appendChild(di);card.appendChild(kb);tb2.appendChild(card);
  });
  if(!teams.length){const nt=h("div",{style:{color:C.border,fontSize:"13px",textAlign:"center",padding:"10px 0"}},[]);nt.textContent="ยังไม่มีทีม";tb2.appendChild(nt);}
  right2.appendChild(tb2);

  const lg2=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"10px 12px"}},[]);
  const lg2h=h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700",marginBottom:"8px"}},[]);lg2h.textContent="📋 บันทึกล่าสุด";lg2.appendChild(lg2h);
  teams.flatMap(t=>(t.log||[]).slice(0,2).map((l,i)=>({emoji:t.emoji,color:t.color,name:t.name,msg:l,k:t.id+i}))).slice(0,8).forEach(item=>{
    const row=h("div",{style:{display:"flex",gap:"5px",marginBottom:"4px",fontSize:"10px"}},[h("span",{},[item.emoji])]);
    const nm=h("span",{style:{color:item.color,fontWeight:"700",flexShrink:"0"}},[]);nm.textContent=item.name+":";
    const mg=h("span",{style:{color:C.sub}},[]);mg.textContent=item.msg;
    row.appendChild(nm);row.appendChild(mg);lg2.appendChild(row);
  });
  if(!teams.length){const nt2=h("div",{style:{color:C.border,fontSize:"11px"}},[]);nt2.textContent="ยังไม่มีกิจกรรม";lg2.appendChild(nt2);}
  right2.appendChild(lg2);
  main.appendChild(right2);wrap.appendChild(main);
  if(showWin) wrap.appendChild(makeWinScreen(teams));
  return wrap;
}

// ── RENDER ──────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  const errbar=document.getElementById("errbar");
  app.innerHTML="";
  if(errbar) app.appendChild(errbar);
  let view;
  if(screen==="landing")            view=renderLanding();
  else if(screen==="host_lobby")    view=renderHostLobby();
  else if(screen==="team_lobby")    view=renderTeamLobby();
  else if(screen==="game")          view=renderGame();
  else if(screen==="host_dashboard")view=renderHostDashboard();
  if(view) app.appendChild(view);
}

// ── INIT ────────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded",()=>{
  const errbar=document.createElement("div");
  errbar.id="errbar";
  Object.assign(errbar.style,{
    display:"none",position:"fixed",top:"14px",left:"50%",
    transform:"translateX(-50%)",background:"#250808",
    border:"1.5px solid "+C.red,borderRadius:"10px",
    padding:"9px 18px",color:"#FCA5A5",fontSize:"13px",
    cursor:"pointer",zIndex:"9999",whiteSpace:"nowrap"
  });
  errbar.addEventListener("click",()=>errbar.style.display="none");
  document.getElementById("app").appendChild(errbar);
  initSocket();
  render();
});
</script>
</body>

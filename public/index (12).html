<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHM Map</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Sarabun,sans-serif;background:#080616;color:#EDE9FF;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.cell{position:relative;width:52px;height:52px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cell-num{position:absolute;top:2px;left:3px;font-size:8px;color:#231748;}
.cell-icon{font-size:19px;}
.tokens{position:absolute;top:-7px;right:-7px;display:flex;flex-wrap:wrap;gap:1px;max-width:40px;justify-content:flex-end;z-index:2;}
.token{width:20px;height:20px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;animation:bob .7s ease infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-5px)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* mobile: stack vertically, centered */
#game-layout{display:flex;flex-direction:column;align-items:center;gap:12px;}
#board-wrap{width:100%;}
#right-panel{width:100%;max-width:420px;}

/* tablet/desktop: side by side */
@media(min-width:768px){
  #game-layout{flex-direction:row;align-items:flex-start;justify-content:center;}
  #board-wrap{flex-shrink:0;}
  #right-panel{flex:1;max-width:380px;min-width:220px;}
  .cell{width:68px;height:68px;}
  .cell-icon{font-size:26px;}
  .token{width:22px;height:22px;font-size:12px;}
}
@media(min-width:1100px){
  .cell{width:80px;height:80px;}
  .cell-icon{font-size:32px;}
  .token{width:26px;height:26px;font-size:14px;}
  #right-panel{max-width:440px;}
}
@media(min-width:1400px){
  .cell{width:92px;height:92px;}
  .cell-icon{font-size:38px;}
  #right-panel{max-width:520px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TOTAL=50,COLS=5;
const Q_STEPS=new Set([3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,47,48,49]);
const TRAPS=new Set([4,8,14,19,25,31,37,43]);
const BOOSTS=new Set([7,11,17,22,28,34,40,46]);
const QUESTIONS=[
  // ── ทฤษฎี ──
  {step:3,q:"การเคลื่อนที่แบบ SHM เกิดขึ้นเมื่อแรงลัพธ์ที่กระทำต่อวัตถุเป็นอย่างไร?",ch:["คงที่ตลอดเวลา","แปรผันตรงกับการกระจัด พุ่งเข้าหาสมดุล","แปรผันตรงกับความเร็ว","เป็นศูนย์ตลอดเวลา"],ans:1,hint:"F = −kx แรงพุ่งเข้าหาตำแหน่งสมดุลเสมอ"},
  {step:6,q:"ในการเคลื่อนที่แบบ SHM ตำแหน่งใดที่วัตถุมีอัตราเร็วสูงสุด?",ch:["ที่ปลายทั้งสองด้าน x = ±A","ที่ตำแหน่งสมดุล x = 0","ที่ x = ±A/2","ที่ x = ±A/√2"],ans:1,hint:"ที่สมดุล x=0 พลังงานศักย์เป็นศูนย์ พลังงานจลน์สูงสุด → v สูงสุด"},
  {step:9,q:"ในการเคลื่อนที่แบบ SHM ตำแหน่งใดที่วัตถุมีความเร่งสูงสุด?",ch:["ที่ตำแหน่งสมดุล x = 0","ที่ปลายทั้งสองด้าน x = ±A","ที่ x = ±A/2","ความเร่งคงที่ตลอด"],ans:1,hint:"a = −ω²x → ความเร่งสูงสุดเมื่อ x = ±A"},
  {step:12,q:"ถ้าวัตถุเริ่มต้นที่ตำแหน่งสมดุล กราฟ x(t) มีรูปแบบใด?",ch:["A cos(ωt)","A sin(ωt)","A tan(ωt)","เส้นตรง"],ans:1,hint:"เริ่มที่ x = 0 → x = A sin(ωt)"},
  {step:15,q:"คาบของลูกตุ้มนาฬิกาขึ้นอยู่กับปัจจัยใด?",ch:["มวลลูกตุ้มและความยาวเชือก","ความยาวเชือกและ g เท่านั้น","มวลลูกตุ้มเท่านั้น","แอมพลิจูดและความยาวเชือก"],ans:1,hint:"T = 2π√(L/g) ไม่ขึ้นกับมวลและแอมพลิจูด (สำหรับมุมเล็กๆ)"},
  {step:18,q:"ในการเคลื่อนที่แบบ SHM พลังงานกลรวมมีค่าเป็นอย่างไร?",ch:["เพิ่มขึ้นเรื่อยๆ","ลดลงเรื่อยๆ","คงที่ตลอดเวลา","แปรผันตามตำแหน่ง"],ans:2,hint:"E = ½kA² = คงที่ พลังงานจลน์และศักย์เปลี่ยนกันไปมา"},
  {step:21,q:"ตำแหน่งใดใน SHM ที่พลังงานจลน์ = พลังงานศักย์?",ch:["x = 0","x = ±A","x = ±A/√2","x = ±A/2"],ans:2,hint:"½mv² = ½kx² → x = A/√2 ≈ 0.707A"},
  {step:24,q:"ถ้าเพิ่มมวลที่ติดสปริงเป็น 4 เท่า คาบจะเปลี่ยนอย่างไร?",ch:["เพิ่มเป็น 2 เท่า","เพิ่มเป็น 4 เท่า","ลดเหลือครึ่งหนึ่ง","ไม่เปลี่ยนแปลง"],ans:0,hint:"T = 2π√(m/k) → m×4 → T×√4 = 2T"},
  {step:27,q:"เมื่อวัตถุเคลื่อนที่แบบ SHM กราฟระหว่างพลังงานจลน์กับการกระจัดมีรูปแบบใด?",ch:["เส้นตรง","พาราโบลาหงาย","พาราโบลาคว่ำ","วงกลม"],ans:2,hint:"KE = ½k(A²−x²) เมื่อ x=0 KE สูงสุด เมื่อ x=±A KE=0 เป็นพาราโบลาคว่ำ"},
  {step:30,q:"ความถี่ธรรมชาติของระบบสปริง-มวลขึ้นอยู่กับอะไร?",ch:["มวลเท่านั้น","ค่าคงที่สปริงเท่านั้น","ทั้งมวลและค่าคงที่สปริง","แอมพลิจูดของการสั่น"],ans:2,hint:"f = (1/2π)√(k/m) ขึ้นกับทั้ง k และ m"},
  // ── คำนวณ ──
  {step:33,q:"ลูกตุ้มเชือกยาว 40 cm แกว่งบนดาวที่ g = 4.9 m/s² คาบ T = ?",ch:["0.90 s","1.26 s","1.79 s","2.00 s"],ans:2,hint:"T = 2π√(L/g) = 2π√(0.4/4.9) ≈ 1.79 s"},
  {step:36,q:"สปริง k = 400 N/m ติดมวล 1 kg ความถี่ f = ?",ch:["2.0 Hz","3.2 Hz","6.3 Hz","20.0 Hz"],ans:1,hint:"f = (1/2π)√(k/m) = (1/2π)√400 ≈ 3.18 Hz"},
  {step:39,q:"สปริง k = 500 N/m มวล 2 kg แอมพลิจูด 8 cm อัตราเร็วสูงสุด v_max = ?",ch:["0.63 m/s","1.26 m/s","2.00 m/s","4.00 m/s"],ans:1,hint:"v_max = A√(k/m) = 0.08×√250 ≈ 1.26 m/s"},
  {step:42,q:"มวล 0.4 kg สปริง k = 160 N/m แอมพลิจูด 6 cm ความเร่งสูงสุด a_max = ?",ch:["12 m/s²","24 m/s²","48 m/s²","96 m/s²"],ans:1,hint:"a_max = (k/m)·A = (160/0.4)×0.06 = 24 m/s²"},
  {step:45,q:"สปริง k = 300 N/m แอมพลิจูด 10 cm พลังงานกลรวม E = ?",ch:["0.75 J","1.50 J","3.00 J","6.00 J"],ans:1,hint:"E = ½kA² = ½×300×(0.1)² = 1.50 J"},
  {step:47,q:"ตัดเชือกลูกตุ้มให้สั้นลงเหลือ 1/4 คาบจะเปลี่ยนอย่างไร?",ch:["ลดเหลือ 1/4","ลดเหลือ 1/2","เพิ่มเป็น 2 เท่า","ไม่เปลี่ยนแปลง"],ans:1,hint:"T = 2π√(L/g) → L×(1/4) → T×(1/2)"},
  {step:48,q:"SHM แอมพลิจูด 10 cm ω = 5 rad/s ที่ตำแหน่ง x = 6 cm อัตราเร็ว v = ?",ch:["0.32 m/s","0.40 m/s","0.50 m/s","0.60 m/s"],ans:1,hint:"v = ω√(A²−x²) = 5×√(0.01−0.0036) = 5×0.08 = 0.40 m/s"},
  {step:49,q:"สปริง k = 200 N/m มวล 0.5 kg แอมพลิจูด 5 cm พลังงานจลน์สูงสุด = ?",ch:["0.10 J","0.25 J","0.50 J","1.00 J"],ans:1,hint:"KE_max = E = ½kA² = ½×200×(0.05)² = 0.25 J"},
];
const PALETTE=[
  {color:"#EC4899",emoji:"🌸"},{color:"#06B6D4",emoji:"🌊"},
  {color:"#10B981",emoji:"🍀"},{color:"#F59E0B",emoji:"⚡"},
  {color:"#A78BFA",emoji:"🔮"},{color:"#EF4444",emoji:"🔥"},
];
const FACES=["","⚀","⚁","⚂","⚃","⚄","⚅"];
const C={bg:"#080616",panel:"#0F0B26",card:"#160E32",border:"#231748",
  text:"#EDE9FF",sub:"#6B5EAD",yellow:"#FCD34D",green:"#10B981",
  red:"#EF4444",cyan:"#06B6D4",purple:"#7C3AED",pink:"#EC4899"};

const ROWS=(()=>{
  const cells=Array.from({length:TOTAL},(_,i)=>i+1);
  const rows=[];
  for(let r=0;r<Math.ceil(TOTAL/COLS);r++){
    const row=cells.slice(r*COLS,r*COLS+COLS);
    rows.push(r%2===0?row:[...row].reverse());
  }
  return rows.reverse();
})();

// ── STATE ──────────────────────────────────────────────────────────────────────
let socket;
let screen="landing",room=null,myId=null,role=null;
let activeTab="join",joinCode="",joinName="",watchCode="";
let showWin=false;

// ── DICE STATE (แยกออกจาก render cycle) ──────────────────────────────────────
let rolling=false;           // กำลังทอยอยู่ → ห้ามกดซ้ำ
let diceVal=null;            // ค่าที่แสดงบนหน้าจอ (null=🎲)
let diceAnimIv=null;         // interval สำหรับ animation
let pendingQ=null;           // คำถามที่รอตอบ
let movingToken=false;       // กำลัง animation เดินอยู่
let moveTarget=null;         // ตำแหน่งเป้าหมาย {pos, hasPendingQ}

// ── SOCKET ─────────────────────────────────────────────────────────────────────
function initSocket(){
  socket=io();

  socket.on("room_created",({code})=>{
    room={code,status:"waiting",teams:{}};
    role="host"; screen="host_lobby"; render();
  });
  socket.on("joined",({code,teamId})=>{
    myId=teamId; role="team"; screen="team_lobby"; render();
  });
  socket.on("watching",({code,status})=>{
    role="host";
    screen=status==="playing"?"host_dashboard":"host_lobby";
    render();
  });
  socket.on("room_update",(r)=>{
    room=r;
    if(role==="team"&&r.status==="playing"&&screen==="team_lobby") screen="game";

    // sync pendingQ จาก server state
    const me=room.teams[myId];
    if(me&&me.pendingQ&&!pendingQ){
      pendingQ=QUESTIONS.find(q=>q.step===me.pendingQ)||null;
    }
    if(me&&!me.pendingQ) pendingQ=null;

    // ตรวจชนะ 3 ทีม
    if(Object.values(r.teams).filter(t=>t.finished).length>=3&&!showWin) showWin=true;

    // ✅ KEY FIX: ถ้ากำลัง animation อยู่ อย่า render หน้าเกม
    // แค่อัปเดต board+leaderboard แบบ in-place แทน
    if(rolling&&screen==="game"){
      updateBoardInPlace(r);
      return;
    }
    render();
  });
  socket.on("game_started",()=>{
    screen=role==="host"?"host_dashboard":"game";
    render();
  });

  // ✅ KEY FIX: dice_result — server ส่งเลขจริงมา
  // animation ทำงานบน diceFace element โดยตรง ไม่ผ่าน render()
  socket.on("dice_result",({roll})=>{
    clearInterval(diceAnimIv);
    let c=0;
    diceAnimIv=setInterval(()=>{
      const v=Math.floor(Math.random()*6)+1;
      // อัปเดต element โดยตรง ไม่ re-render
      const df=document.getElementById("diceFace");
      if(df) df.textContent=FACES[v];
      c++;
      if(c>=14){
        clearInterval(diceAnimIv);
        diceAnimIv=null;
        diceVal=roll;
        rolling=false;
        // แสดงเลขจริงจาก server
        const df2=document.getElementById("diceFace");
        if(df2){
          df2.textContent=FACES[roll];
          df2.style.animation="none";
          df2.style.filter="drop-shadow(0 0 16px "+(room?.teams?.[myId]?.color||C.purple)+"99)";
        }
        // อัปเดต label และปุ่ม
        updateDiceUI();
        // ✅ KEY FIX: render ใหม่หลัง animation จบ
        // เพื่อให้ modal คำถามแสดงได้ถูกต้อง
        render();
      }
    },60);
  });

  socket.on("kicked",()=>{
    screen="landing"; room=null; myId=null;
    rolling=false; diceVal=null; pendingQ=null;
    showErr("คุณถูกครูนำออกจากห้อง"); render();
  });
  socket.on("err",(msg)=>showErr(msg));
}

// ── อัปเดต board+tokens โดยไม่ re-render ทั้งหน้า ─────────────────────────────
function updateBoardInPlace(r){
  // re-render แค่ board section
  const bw=document.getElementById("board-inner");
  if(bw){
    bw.innerHTML="";
    const teams=Object.values(r.teams||{});
    ROWS.forEach(row=>{
      const rowEl=document.createElement("div");
      rowEl.style.cssText="display:flex;gap:3px;";
      row.forEach(n=>rowEl.appendChild(makeCell(n,teams)));
      bw.appendChild(rowEl);
    });
  }
  // อัปเดต leaderboard
  updateLeaderboard(r);
}

function updateDiceUI(){
  // อัปเดต label ทอยได้
  const dl=document.getElementById("diceLabel");
  if(dl){
    dl.style.display=(diceVal&&!rolling&&!pendingQ)?"block":"none";
    if(diceVal) dl.textContent="ทอยได้: "+diceVal+" "+(diceVal>=5?"🌟":"🎯");
  }
  // อัปเดตปุ่ม
  const rb=document.getElementById("rollBtn");
  if(rb){
    const me=room?.teams?.[myId];
    const myDone=me?.finished||false;
    const dis=rolling||pendingQ||myDone;
    rb.disabled=dis;
    rb.style.opacity=dis?.5:1;
    rb.style.cursor=dis?"not-allowed":"pointer";
    rb.style.background=dis?"#2D1B69":"linear-gradient(135deg,"+(me?.color||C.purple)+","+(me?.color||C.pink)+")";
    rb.textContent=rolling?"⏳ กำลังทอย...":pendingQ?"⏳ ตอบคำถามก่อน":myDone?"🏆 จบแล้ว!":"🎲 ทอยลูกเต๋า";
  }
  // แสดง/ซ่อน pendingQ notice
  const qn=document.getElementById("qNotice");
  if(qn) qn.style.display=pendingQ?"block":"none";
}

function updateLeaderboard(r){
  const lb=document.getElementById("leaderboard-inner");
  if(!lb) return;
  const teams=Object.values(r.teams||{});
  const sorted=[...teams].sort((a,b)=>b.pos-a.pos);
  lb.innerHTML="";
  sorted.forEach((t,i)=>{
    const row=document.createElement("div");
    row.style.cssText="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid "+C.border+"22;";
    const rk=document.createElement("span");rk.style.cssText="font-size:12px;width:18px;text-align:center;color:"+C.sub+";";
    rk.textContent=["🥇","🥈","🥉"][i]||(i+1)+".";
    const em=document.createElement("span");em.style.fontSize="15px";em.textContent=t.emoji;
    const di=document.createElement("div");di.style.cssText="flex:1;min-width:0;";
    const dn=document.createElement("div");
    dn.style.cssText="font-size:11px;font-weight:"+(t.id===myId?"700":"400")+";color:"+(t.id===myId?t.color:C.text)+";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;";
    dn.textContent=t.name+(t.finished?" 🏆":"")+(t.id===myId?" 👈":"");
    const dbar=document.createElement("div");dbar.style.cssText="height:3px;background:"+C.border+";border-radius:3px;margin-top:2px;";
    const dbf=document.createElement("div");dbf.style.cssText="height:100%;background:"+t.color+";border-radius:3px;width:"+((t.pos-1)/(TOTAL-1)*100)+"%;transition:width .4s;";
    dbar.appendChild(dbf);di.appendChild(dn);di.appendChild(dbar);
    const sp=document.createElement("span");sp.style.cssText="font-size:10px;color:"+C.sub+";font-family:monospace;flex-shrink:0;";sp.textContent=t.pos+"/"+TOTAL;
    row.appendChild(rk);row.appendChild(em);row.appendChild(di);row.appendChild(sp);lb.appendChild(row);
  });
}

// ── HELPERS ────────────────────────────────────────────────────────────────────

// animation เดินทีละช่อง พร้อม particle effect
function animateMove(fromPos, toPos, me, roll){
  movingToken=true;
  let cur=fromPos;
  const color=me.color;

  function spawnParticles(cellEl){
    if(!cellEl) return;
    const rect=cellEl.getBoundingClientRect();
    for(let i=0;i<8;i++){
      const p=document.createElement("div");
      const angle=Math.random()*Math.PI*2;
      const dist=20+Math.random()*30;
      const dx=Math.cos(angle)*dist;
      const dy=Math.sin(angle)*dist;
      Object.assign(p.style,{
        position:"fixed",
        left:(rect.left+rect.width/2)+"px",
        top:(rect.top+rect.height/2)+"px",
        width:"8px",height:"8px",
        borderRadius:"50%",
        background:color,
        boxShadow:"0 0 6px "+color,
        pointerEvents:"none",
        zIndex:"999",
        transition:"all 0.4s ease-out",
        opacity:"1",
      });
      document.body.appendChild(p);
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          Object.assign(p.style,{
            transform:"translate("+dx+"px,"+dy+"px)",
            opacity:"0",
          });
          setTimeout(()=>p.remove(),400);
        });
      });
    }
  }

  function findCellEl(pos){
    // หา cell element จาก board
    const cells=document.querySelectorAll(".cell .cell-num");
    for(let el of cells){
      if(el.textContent===String(pos)) return el.closest(".cell");
    }
    return null;
  }

  function step(){
    if(cur>=toPos){
      // ถึงเป้าหมายแล้ว
      movingToken=false;
      // ตรวจว่ามีคำถามไหม
      const hasPQ=room?.teams?.[myId]?.pendingQ;
      if(hasPQ){
        // หน่วง 3 วินาทีก่อนเด้งคำถาม
        setTimeout(()=>{
          render();
        },3000);
      } else {
        render();
      }
      return;
    }
    cur++;
    // อัปเดต board ให้แสดง token ที่ช่อง cur
    const boardInner=document.getElementById("board-inner");
    if(boardInner){
      boardInner.innerHTML="";
      // สร้าง fake teams ที่ myId อยู่ที่ cur
      const fakeTeams=Object.values(room?.teams||{}).map(t=>
        t.id===myId?{...t,pos:cur}:t
      );
      // ซ่อน token คนอื่น (แสดงแค่ตัวเอง)
      const myOnlyTeams=fakeTeams.filter(t=>t.id===myId);
      ROWS.forEach(row=>{
        const rowEl=document.createElement("div");
        rowEl.style.cssText="display:flex;gap:3px;";
        row.forEach(n=>rowEl.appendChild(makeCell(n,myOnlyTeams)));
        boardInner.appendChild(rowEl);
      });
    }
    // spawn particles ที่ช่องปัจจุบัน
    setTimeout(()=>spawnParticles(findCellEl(cur)),50);
    // เดินช่องต่อไปทุก 350ms
    setTimeout(step, 350);
  }

  step();
}

function showErr(msg){
  const el=document.getElementById("errbar");if(!el)return;
  el.textContent="⚠️ "+msg;el.style.display="block";

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);

  const myDone=me?.finished||false;
  const hasPending=!!pendingQ;

  const wrap=h("div",{style:{minHeight:"100vh",background:"radial-gradient(ellipse at 15% 15%,#2A1760,"+C.bg+" 58%)",padding:"10px"}},[]);

  // header
  const hdr=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}},[]);
  const hl=h("div",{},[]);
  const ht=h("div",{style:{fontSize:"15px",fontWeight:"900"}},[]);ht.textContent="🐍 ผจญภัยใน SHM Map";hl.appendChild(ht);
  const hs=h("div",{style:{fontSize:"10px",color:C.sub}},[]);
  const rc=h("b",{style:{color:C.yellow,fontFamily:"monospace"}},[room?.code||""]);
  hs.appendChild(document.createTextNode("ห้อง "));hs.appendChild(rc);hs.appendChild(document.createTextNode(" · "+teams.length+" ทีม"));hl.appendChild(hs);hdr.appendChild(hl);
  if(me){
    const hr=h("div",{style:{textAlign:"right"}},[h("span",{style:{fontSize:"20px"}},[me.emoji])]);
    const hn=h("div",{style:{fontSize:"12px",color:me.color,fontWeight:"700"}},[]);hn.textContent=me.name;
    const hp=h("div",{style:{fontSize:"10px",color:C.sub}},[]);hp.textContent="ช่องที่ "+me.pos+" / "+TOTAL;
    hr.appendChild(hn);hr.appendChild(hp);hdr.appendChild(hr);
  }
  wrap.appendChild(hdr);

  // main
  const main=h("div",{id:"game-layout",style:{}},[]);

  // board — นักเรียนเห็นแค่ token ตัวเอง, ครูเห็นทุกทีม
  const myTokenTeams = me ? teams.filter(t=>t.id===myId) : teams;
  const bw=h("div",{id:"board-wrap",style:{background:C.panel,border:"2px solid "+C.border,borderRadius:"14px",padding:"10px"}},[makeBoard(myTokenTeams)]);
  const leg=h("div",{style:{display:"flex",gap:"10px",marginTop:"8px",flexWrap:"wrap",justifyContent:"center"}},[]);
  [["❓","โจทย์"],["💀","ถอย-2"],["⭐","หน้า+2"],["🏆","ชนะ"]].forEach(([ic,lb])=>{const s=h("span",{style:{fontSize:"10px",color:C.sub}},[]);s.textContent=ic+" "+lb;leg.appendChild(s);});
  bw.appendChild(leg);main.appendChild(bw);

  // right panel — centered on mobile
  const right=h("div",{id:"right-panel",style:{display:"flex",flexDirection:"column",gap:"9px",alignItems:"stretch"}},[]);

  // progress
  if(me){
    const pg=h("div",{style:{background:C.card,border:"2px solid "+me.color+"55",borderRadius:"12px",padding:"10px 12px"}},[]);
    const ph=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}},[]);
    const pn=h("span",{style:{fontSize:"11px",color:me.color,fontWeight:"700"}},[]);pn.textContent=me.emoji+" "+me.name;
    const pp=h("span",{style:{fontSize:"11px",color:C.sub}},[]);pp.textContent=me.pos+"/"+TOTAL;
    ph.appendChild(pn);ph.appendChild(pp);pg.appendChild(ph);
    const bar=h("div",{style:{height:"7px",background:C.border,borderRadius:"4px",overflow:"hidden"}},[]);
    const bf=h("div",{style:{height:"100%",background:me.color,borderRadius:"4px",width:((me.pos-1)/(TOTAL-1)*100)+"%",transition:"width .5s"}},[]);
    bar.appendChild(bf);pg.appendChild(bar);
    const pct=h("div",{style:{marginTop:"5px",fontSize:"10px",color:C.sub}},[]);pct.textContent="ความคืบหน้า "+Math.round((me.pos-1)/(TOTAL-1)*100)+"%";pg.appendChild(pct);right.appendChild(pg);
  }

  // dice card
  const dc=h("div",{style:{background:C.card,border:"2px solid "+C.border,borderRadius:"12px",padding:"16px 12px",textAlign:"center"}},[]);
  const df=h("div",{id:"diceFace",style:{fontSize:"80px",lineHeight:"1",marginBottom:"8px",display:"inline-block",animation:rolling?"spin .06s linear infinite":"none"}},[]);
  df.textContent=diceVal?FACES[diceVal]:"🎲";dc.appendChild(df);

  const dl=h("div",{id:"diceLabel",style:{fontSize:"15px",fontWeight:"700",color:C.yellow,marginBottom:"10px",background:C.yellow+"11",borderRadius:"8px",padding:"5px 0",display:(diceVal&&!rolling&&!hasPending&&!myDone)?"block":"none"}},[]);
  if(diceVal) dl.textContent="ทอยได้: "+diceVal+" "+(diceVal>=5?"🌟":"🎯");dc.appendChild(dl);

  const qn=h("div",{id:"qNotice",style:{fontSize:"13px",fontWeight:"700",color:C.yellow,marginBottom:"10px",animation:"pulse 1s ease infinite",display:hasPending?"block":"none"}},[]);
  qn.textContent="❓ ตอบคำถามก่อนนะคะ!";dc.appendChild(qn);

  if(myDone){const dl2=h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.green,marginBottom:"10px"}},[]);dl2.textContent="🏆 ถึงเป้าหมายแล้ว!";dc.appendChild(dl2);}

  const rb=h("button",{
    id:"rollBtn",
    style:{background:(rolling||hasPending||myDone)?"#2D1B69":"linear-gradient(135deg,"+(me?.color||C.purple)+","+(me?.color||C.pink)+")",border:"none",borderRadius:"12px",padding:"15px 0",width:"100%",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:(rolling||hasPending||myDone)?"not-allowed":"pointer",opacity:(hasPending||myDone)?".5":"1",fontFamily:"inherit",transition:"all .2s"},
    onClick:()=>{
      if(rolling||hasPending||myDone) return;
      rolling=true;
      // อัปเดต UI ทันทีโดยไม่ render()
      rb.textContent="⏳ กำลังทอย...";rb.style.opacity=".5";rb.style.cursor="not-allowed";rb.style.background="#2D1B69";
      const dfEl=document.getElementById("diceFace");if(dfEl)dfEl.style.animation="spin .06s linear infinite";
      socket.emit("roll_dice",{code:room.code});
    }
  },[]);
  rb.textContent=rolling?"⏳ กำลังทอย...":hasPending?"⏳ ตอบคำถามก่อน":myDone?"🏆 จบแล้ว!":"🎲 ทอยลูกเต๋า";
  dc.appendChild(rb);right.appendChild(dc);

  // leaderboard
  const lbWrap=h("div",{style:{background:C.card,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"10px 11px"}},[]);
  const lbh=h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700",marginBottom:"8px"}},[]);lbh.textContent="🏅 อันดับ";lbWrap.appendChild(lbh);
  const lbInner=h("div",{id:"leaderboard-inner"},[]);lbWrap.appendChild(lbInner);right.appendChild(lbWrap);
  updateLeaderboard(room);

  // log
  if(me?.log){
    const lg=h("div",{style:{background:C.card,border:"1.5px solid "+me.color+"44",borderRadius:"11px",padding:"10px 12px"}},[]);
    const lgh=h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700",marginBottom:"5px"}},[]);lgh.textContent="📋 บันทึกของฉัน";lg.appendChild(lgh);
    me.log.slice(0,5).forEach((l,i)=>{const le=h("div",{style:{fontSize:"11px",color:i===0?C.text:"#4A3880",marginBottom:"3px",lineHeight:"1.4"}},[]);le.textContent=l;lg.appendChild(le);});
    right.appendChild(lg);
  }

  main.appendChild(right);wrap.appendChild(main);
  if(pendingQ&&me) wrap.appendChild(makeQModal(pendingQ,me.color));
  if(showWin) wrap.appendChild(makeWinScreen(teams));
  return wrap;
}

function renderHostDashboard(){
  const teams=Object.values(room?.teams||{});const sorted=[...teams].sort((a,b)=>b.pos-a.pos);
  const wrap=h("div",{style:{minHeight:"100vh",background:"radial-gradient(ellipse at 10% 10%,#2A1760,"+C.bg+" 58%)",padding:"14px 12px"}},[]);
  const hdr=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}},[]);
  const hl=h("div",{},[]);const ht=h("div",{style:{fontSize:"16px",fontWeight:"900"}},[]);ht.textContent="👩‍🏫 แดชบอร์ดครู";hl.appendChild(ht);
  const hs=h("div",{style:{fontSize:"11px",color:C.sub}},[]);const rc=h("b",{style:{color:C.yellow,fontFamily:"monospace",fontSize:"13px"}},[room?.code||""]);
  hs.appendChild(document.createTextNode("ห้อง "));hs.appendChild(rc);hs.appendChild(document.createTextNode(" · "+teams.length+" ทีม"));hl.appendChild(hs);hdr.appendChild(hl);
  const btns=h("div",{style:{display:"flex",gap:"7px"}},[]);
  const lb2=h("button",{style:{background:"none",border:"1px solid "+C.border,borderRadius:"8px",padding:"6px 12px",color:C.sub,fontSize:"11px"},onClick:()=>{screen="host_lobby";render();}},[]);lb2.textContent="← Lobby";
  const rb2=h("button",{style:{background:"linear-gradient(135deg,"+C.red+",#B91C1C)",border:"none",borderRadius:"8px",padding:"6px 13px",color:"#fff",fontSize:"11px",fontWeight:"700"},onClick:()=>socket.emit("reset_game",{code:room.code})},[]);rb2.textContent="🔄 รีเซ็ต";
  btns.appendChild(lb2);btns.appendChild(rb2);hdr.appendChild(btns);wrap.appendChild(hdr);
  const main=h("div",{style:{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"flex-start"}},[]);
  const bw2=h("div",{style:{background:C.panel,border:"2px solid "+C.border,borderRadius:"14px",padding:"10px",flexShrink:"0"}},[]);
  const bwh=h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700",marginBottom:"8px"}},[]);bwh.textContent="📍 ภาพรวมกระดาน";bw2.appendChild(bwh);bw2.appendChild(makeBoard(teams));main.appendChild(bw2);
  const right2=h("div",{style:{flex:"1",minWidth:"240px",display:"flex",flexDirection:"column",gap:"10px"}},[]);
  const stats=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"12px 14px",display:"flex",gap:"16px",flexWrap:"wrap"}},[]);
  [["ทีม",teams.length,"#A78BFA"],["จบ",teams.filter(t=>t.finished).length,C.green],["ตอบ",teams.filter(t=>t.pendingQ).length,C.yellow],["Q","18/50",C.cyan]].forEach(([lb3,v,col])=>{
    const d=h("div",{style:{textAlign:"center"}},[]);const dv=h("div",{style:{fontSize:"22px",fontWeight:"900",color:col}},[]);dv.textContent=String(v);const dl3=h("div",{style:{fontSize:"10px",color:C.sub}},[]);dl3.textContent=lb3;d.appendChild(dv);d.appendChild(dl3);stats.appendChild(d);
  });right2.appendChild(stats);
  const tb2=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"12px 13px"}},[]);
  const tb2h=h("div",{style:{fontSize:"11px",color:C.sub,fontWeight:"700",marginBottom:"10px"}},[]);tb2h.textContent="🏅 อันดับทีม";tb2.appendChild(tb2h);
  sorted.forEach((t,i)=>{
    const card=h("div",{style:{background:C.card,borderRadius:"9px",padding:"9px 11px",marginBottom:"7px",border:"1.5px solid "+t.color+"33",display:"flex",alignItems:"center",gap:"8px"}},[]);
    const rk=h("span",{style:{fontSize:"13px",width:"19px",textAlign:"center"}},[]);rk.textContent=["🥇","🥈","🥉"][i]||(i+1)+".";
    const em=h("span",{style:{fontSize:"18px"}},[t.emoji]);
    const di=h("div",{style:{flex:"1",minWidth:"0"}},[]);
    const dn=h("div",{style:{fontWeight:"700",color:t.color,fontSize:"12px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},[]);dn.textContent=t.name+(t.finished?" 🏆":"");
    const dbar=h("div",{style:{height:"4px",background:C.border,borderRadius:"3px",marginTop:"2px"}},[h("div",{style:{height:"100%",background:t.color,borderRadius:"3px",width:((t.pos-1)/(TOTAL-1)*100)+"%",transition:"width .4s"}},[])]);
    const dp=h("div",{style:{fontSize:"10px",color:C.sub,marginTop:"2px"}},[]);dp.textContent="ช่อง "+t.pos+"/"+TOTAL+(t.pendingQ?" ⏳":"");
    di.appendChild(dn);di.appendChild(dbar);di.appendChild(dp);
    const kb=h("button",{style:{background:"none",border:"1px solid "+C.red+"55",borderRadius:"6px",padding:"3px 8px",color:C.red,fontSize:"10px"},onClick:()=>socket.emit("kick_team",{code:room.code,teamId:t.id})},[]);kb.textContent="นำออก";
    card.appendChild(rk);card.appendChild(em);card.appendChild(di);card.appendChild(kb);tb2.appendChild(card);
  });
  if(!teams.length){const nt=h("div",{style:{color:C.border,fontSize:"13px",textAlign:"center",padding:"10px 0"}},[]);nt.textContent="ยังไม่มีทีม";tb2.appendChild(nt);}right2.appendChild(tb2);
  const lg2=h("div",{style:{background:C.panel,border:"1.5px solid "+C.border,borderRadius:"12px",padding:"10px 12px"}},[]);
  const lg2h=h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700",marginBottom:"8px"}},[]);lg2h.textContent="📋 บันทึกล่าสุด";lg2.appendChild(lg2h);
  teams.flatMap(t=>(t.log||[]).slice(0,2).map((l,i)=>({emoji:t.emoji,color:t.color,name:t.name,msg:l}))).slice(0,8).forEach(item=>{
    const row=h("div",{style:{display:"flex",gap:"5px",marginBottom:"4px",fontSize:"10px"}},[h("span",{},[item.emoji])]);
    const nm=h("span",{style:{color:item.color,fontWeight:"700",flexShrink:"0"}},[]);nm.textContent=item.name+":";
    const mg=h("span",{style:{color:C.sub}},[]);mg.textContent=item.msg;row.appendChild(nm);row.appendChild(mg);lg2.appendChild(row);
  });
  if(!teams.length){const nt2=h("div",{style:{color:C.border,fontSize:"11px"}},[]);nt2.textContent="ยังไม่มีกิจกรรม";lg2.appendChild(nt2);}
  right2.appendChild(lg2);main.appendChild(right2);wrap.appendChild(main);
  if(showWin) wrap.appendChild(makeWinScreen(teams));
  return wrap;
}

function render(){
  const app=document.getElementById("app");
  const errbar=document.getElementById("errbar");
  app.innerHTML="";
  if(errbar) app.appendChild(errbar);
  let view;
  if(screen==="landing")            view=renderLanding();
  else if(screen==="host_lobby")    view=renderHostLobby();
  else if(screen==="team_lobby")    view=renderTeamLobby();
  else if(screen==="game")          view=renderGame();
  else if(screen==="host_dashboard")view=renderHostDashboard();
  if(view) app.appendChild(view);
}

window.addEventListener("DOMContentLoaded",()=>{
  const errbar=document.createElement("div");
  errbar.id="errbar";
  Object.assign(errbar.style,{display:"none",position:"fixed",top:"14px",left:"50%",transform:"translateX(-50%)",background:"#250808",border:"1.5px solid "+C.red,borderRadius:"10px",padding:"9px 18px",color:"#FCA5A5",fontSize:"13px",cursor:"pointer",zIndex:"9999",whiteSpace:"nowrap"});
  errbar.addEventListener("click",()=>errbar.style.display="none");
  document.getElementById("app").appendChild(errbar);
  initSocket();render();
});
</script>
</body>
